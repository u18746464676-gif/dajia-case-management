# 生产环境 nginx 配置 - hzyhmz.top
# 路径：/etc/nginx/conf.d/case-management-ssl.conf
# 所有静态资源 no-store，确保用户始终获取最新版本

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hzyhmz.top www.hzyhmz.top;

    root /var/www/case-management;
    index index.html;
    client_max_body_size 50m;

    ssl_certificate /etc/letsencrypt/live/hzyhmz.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hzyhmz.top/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # 所有静态资源不缓存
    location ~* \.(html|js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name hzyhmz.top www.hzyhmz.top;
    location /.well-known/acme-challenge/ {
        root /var/www/case-management;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}
