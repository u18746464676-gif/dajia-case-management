name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_TOS_BUCKET: ${{ secrets.VITE_TOS_BUCKET }}
          VITE_TOS_REGION: ${{ secrets.VITE_TOS_REGION }}
          VITE_TOS_ENDPOINT: ${{ secrets.VITE_TOS_ENDPOINT }}
          VITE_TOS_ACCESS_KEY_ID: ${{ secrets.VITE_TOS_ACCESS_KEY_ID }}
          VITE_TOS_SECRET_ACCESS_KEY: ${{ secrets.VITE_TOS_SECRET_ACCESS_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
